<!DOCTYPE html>
<html>
<head>
<title>Display property</title>
<style>
    body
    {
       background-color: rgb(232, 159, 65);
    }
</style>
</head>
<body>
<form action="https://formspree.io/f/maqrbnqz" method="post">
<h2 style="text-align: center;">This is a form of Backchodi</h2>
<div style="font-size:x-large;">
<label>Name:</label>
<input type="text" name="Full_name" placeholder="Naam kya hai tera lale!"><br><br>
</div>
<div style="font-size: x-large;">
<label>Father's name:</label>
<input type="text"style="width:200px" name="Father's_name" placeholder="Asli baap ka naam likhio bache!"><br><br>
</div>
<div style="font-size: x-large;">
<label>Date of Birth:</label>
<input type="date"><br><br>
</div>
<div style="font-size: x-large;">
<label>Email ID:</label>
<input type="email" name="myEmail"><br><br>
</div>
<div style="font-size:x-large;">
<label for="Course">Course:</label>
<select name="myCourse" id="Course">
    <option>BCA</option>
    <option>BBA</option>
    <option>B.Tech</option>
    <option>BSE</option>
    <option>BA</option>
    <option>B.ED.</option>
</select><br><br>
</div>
<div style="font-size:x-large;">
<label>Year:</label><br>
<input type="radio" name="myYear" value="1st Year">1st Year<br>
<input type="radio" name="myYear" value="2nd Year">2nd Year<br>
<input type="radio" name="myYear" value="3rd Year">3rd Year<br>
<input type="radio" name="myYear" value="4th Year">4th Year<br><br>
</div>
<div style="font-size: x-large;">
<label>Subjects:</label><br>
<input type="checkbox" name="mySubject" value="Fundamental Mathematics">Fundamental Mathematics<br>
<input type="checkbox" name="mySubject" value="IT Skill">IT Skill<br>
<input type="checkbox" name="mySubject" value="PDP">PDP<br>
<input type="checkbox" name="mySubject" value="Object-oriented Programming using Java">Object-oriented Programming using Java<br>
<input type="checkbox" name="mySubject" value="Computer Architecture">Computer Architecture<br>
<input type="checkbox" name="mySubject" value="Operating System">Operating System<br>
<input type="checkbox" name="mySubject" value="Problem Solving Technique">Problem Solving Technique<br>
<input type="checkbox" name="mySubject" value="Data Structure">Data Structure<br>
<input type="checkbox" name="mySubject" value="English">English<br>
<input type="checkbox" name="mySubject" value="EVS">EVS<br>
<input type="checkbox" name="mySubject" value="Indian Constituion">Indian Constituion<br><br>
</div>
<div>
<button type="submit">Submit now</button>
</div>
</form>
</body>
</html>
