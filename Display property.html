<!DOCTYPE html>
<html>
<head>
<title>Display property</title>
<style>
    body
    {
       background-color: rgb(232, 159, 65);
    }
</style>
</head>
<body>
<h2 style="text-align: center;">This is a form of Backchodi</h2>
<div style="font-size:x-large;">
<label>Name:</label>
<input type="text" name="myName" placeholder="Naam kya hai tera lale!"><br><br>
</div>
<div style="font-size: x-large;">
<label>Father's name:</label>
<input type="text"style="width:200px" name="myFather's name" placeholder="Asli baap ka naam likhio bache!"><br><br>
</div>
<div style="font-size: x-large;">
<label>Date of Birth:</label>
<input type="date"><br><br>
</div>
<div style="font-size: x-large;">
<label>Email ID:</label>
<input type="email" name="myEmail"><br><br>
</div>
<div style="font-size:x-large;">
<label for="Course">Course:</label>
<select name="myCourse" id="Course">
    <option>BCA</option>
    <option>BBA</option>
    <option>B.Tech</option>
    <option>BSE</option>
    <option>BA</option>
    <option>B.ED.</option>
</select><br><br>
</div>
<div style="font-size:x-large;">
<label>Year:</label><br>
<input type="radio" name="myYear">1st Year<br>
<input type="radio" name="myYear">2nd Year<br>
<input type="radio" name="myYear">3rd Year<br>
<input type="radio" name="myYear">4th Year<br><br>
</div>
<div style="font-size: x-large;">
<label>Subjects:</label><br>
<input type="checkbox" name="mySubject">Fundamental Mathematics<br>
<input type="checkbox" name="mySubject">IT Skill<br>
<input type="checkbox" name="mySubject">PDP<br>
<input type="checkbox" name="mySubject">Object-oriented Programming using Java<br>
<input type="checkbox" name="mySubject">Computer Architecture<br>
<input type="checkbox" name="mySubject">Operating System<br>
<input type="checkbox" name="mySubject">Problem Solving Technique<br>
<input type="checkbox" name="mySubject">Data Structure<br>
<input type="checkbox" name="mySubject">English<br>
<input type="checkbox" name="mySubject">EVS<br>
<input type="checkbox" name="mySubject">Indian Constituion><br><br>
</div>
<div >
<input type="submit" value="Submit now">
</div>
</body>
</html>
